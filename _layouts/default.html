<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} — App Docs</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  </head>
  <body>

    <header class="site-header">
      <div class="header-inner">
        <div class="site-branding">
          <a href="{{ '/' | relative_url }}" class="site-title">📚 App Docs</a>
          <p class="site-tagline">Documentation for all apps by Harshit Gindra</p>
        </div>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          {% for app in site.data.apps %}
          <a href="{{ app.url | relative_url }}">{{ app.name }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="content-wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>
          {% for app in site.data.apps %}
          <a href="{{ app.url | relative_url }}">{{ app.name }}</a>{% unless forloop.last %} · {% endunless %}
          {% endfor %}
        </p>
        <p>© 2026 Harshit Gindra · <a href="mailto:masons_oil04@icloud.com">masons_oil04@icloud.com</a></p>
      </div>
    </footer>

  </body>
</html>
